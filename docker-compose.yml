services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: backendsafe-api
    ports:
      - "7101:4000"
    volumes:
      - ./backups:/backups
      - ./server/prisma:/app/server/prisma
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=${DATABASE_URL}
      - DASHBOARD_URL=${DASHBOARD_URL}
    restart: always

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://dbapi.webbriks.com/api
    container_name: backendsafe-dashboard
    ports:
      - "7100:3000"
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
    depends_on:
      - server
    restart: always

volumes:
  backups:
  prisma_db:
