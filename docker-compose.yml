services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: backendsafe-api
    ports:
      - "4000:4000"
    volumes:
      - ./backups:/backups
      - ./server/prisma:/app/server/prisma
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=file:./dev.db
    restart: always

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:4000/api
    container_name: backendsafe-dashboard
    ports:
      - "3000:3000"
    depends_on:
      - server
    restart: always

volumes:
  backups:
  prisma_db:
